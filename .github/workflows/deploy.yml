name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run python manage.py migrate
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost

      - name: Run Django checks
        run: uv run python manage.py check --deploy
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      GITHUB_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_GITHUB_SECRET }}
      GITHUB_OWNER: ${{ vars.GH_OWNER }}
      GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
      GUMROAD_WEBHOOK_TOKEN: ${{ secrets.GUMROAD_WEBHOOK_TOKEN }}
      PRODUCTS_FEED_MIRROR: ${{ vars.PRODUCTS_FEED_MIRROR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      UMAMI_DB_PASSWORD: ${{ secrets.UMAMI_DB_PASSWORD }}
      UMAMI_APP_SECRET: ${{ secrets.UMAMI_APP_SECRET }}
      VPS_HOST: ${{ vars.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT }}
      DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS }}
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      SSL_EMAIL: ${{ vars.SSL_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets and vars
        run: |
          set -euo pipefail
          required=(
            DJANGO_SECRET_KEY
            VPS_SSH_KEY
            POSTGRES_PASSWORD
            GITHUB_WEBHOOK_SECRET
            GITHUB_OWNER
            GUMROAD_ACCESS_TOKEN
            GUMROAD_WEBHOOK_TOKEN
            UMAMI_DB_PASSWORD
            UMAMI_APP_SECRET
            VPS_HOST
            VPS_USER
            VPS_PORT
            DJANGO_ALLOWED_HOSTS
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          command_timeout: 45m
          script: |
            set -e
            cd /opt/rohans-weblog

            # Pull latest code
            git pull origin main

            # Write env file
            cat > .env << 'ENVEOF'
            DJANGO_SECRET_KEY=${{ env.DJANGO_SECRET_KEY }}
            SECRET_KEY=${{ env.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=${{ env.DJANGO_ALLOWED_HOSTS }}
            POSTGRES_DB=weblog
            POSTGRES_USER=weblog
            POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
            GITHUB_WEBHOOK_SECRET=${{ env.GITHUB_WEBHOOK_SECRET }}
            GITHUB_OWNER=${{ env.GITHUB_OWNER }}
            GUMROAD_ACCESS_TOKEN=${{ env.GUMROAD_ACCESS_TOKEN }}
            GUMROAD_WEBHOOK_TOKEN=${{ env.GUMROAD_WEBHOOK_TOKEN }}
            PRODUCTS_FEED_MIRROR=${{ env.PRODUCTS_FEED_MIRROR }}
            UMAMI_DB_PASSWORD=${{ env.UMAMI_DB_PASSWORD }}
            UMAMI_APP_SECRET=${{ env.UMAMI_APP_SECRET }}
            ENVEOF

            # Build and deploy
            docker compose build
            docker compose up -d

            # Refresh nginx upstream DNS after web container recreation
            docker compose restart nginx

            # Auto-bootstrap SSL if missing (safe to re-run on every deploy).
            APP_DOMAIN="${{ env.APP_DOMAIN }}"
            if [ -z "$APP_DOMAIN" ]; then
              APP_DOMAIN="$(echo "${{ env.DJANGO_ALLOWED_HOSTS }}" | cut -d',' -f1)"
            fi
            if [ -z "$APP_DOMAIN" ]; then
              echo "APP_DOMAIN could not be resolved."
              exit 1
            fi
            SSL_EMAIL="${{ env.SSL_EMAIL }}"
            if [ -z "$SSL_EMAIL" ]; then
              SSL_EMAIL="admin@${APP_DOMAIN}"
            fi

            CERT_EXISTS=0
            if timeout 30s docker compose exec -T certbot certbot certificates >/tmp/certbot-certs.txt 2>/dev/null; then
              if grep -q "Certificate Name: ${APP_DOMAIN}" /tmp/certbot-certs.txt; then
                CERT_EXISTS=1
              fi
            else
              echo "Skipping certbot certificate check (timeout/unavailable)."
            fi

            if [ "$CERT_EXISTS" -eq 0 ]; then
              echo "No certificate detected for ${APP_DOMAIN}. Attempting SSL bootstrap..."
              if ! timeout 8m ./setup-ssl.sh "$SSL_EMAIL" "$APP_DOMAIN"; then
                echo "SSL bootstrap timed out/failed; continuing deployment."
              fi
            else
              echo "Certificate for ${APP_DOMAIN} already exists."
            fi

            # Wait and verify
            sleep 10
            docker compose ps
            docker compose exec -T nginx nginx -t
            docker compose exec -T web python manage.py check --deploy
