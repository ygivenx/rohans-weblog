name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run python manage.py migrate
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost

      - name: Run Django checks
        run: uv run python manage.py check --deploy
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='db.sqlite3' \
            --exclude='staticfiles' \
            --exclude='media' \
            --exclude='.DS_Store' \
            --exclude='content' \
            .

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          source: /tmp/deploy.tar.gz
          target: /tmp

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: |
            set -e
            cd /opt/rohans-weblog

            # Extract new code
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # Write env file from secrets
            cat > .env << 'ENVEOF'
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=${{ vars.DJANGO_ALLOWED_HOSTS }}
            POSTGRES_DB=weblog
            POSTGRES_USER=weblog
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ENVEOF

            # Build and deploy
            docker compose build
            docker compose up -d

            # Wait and verify
            sleep 10
            docker compose ps
