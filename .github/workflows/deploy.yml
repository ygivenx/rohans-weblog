name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run python manage.py migrate
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost

      - name: Run Django checks
        run: uv run python manage.py check --deploy
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      UMAMI_DB_PASSWORD: ${{ secrets.UMAMI_DB_PASSWORD }}
      UMAMI_APP_SECRET: ${{ secrets.UMAMI_APP_SECRET }}
      VPS_HOST: ${{ vars.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT }}
      DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets and vars
        run: |
          set -euo pipefail
          required=(
            DJANGO_SECRET_KEY
            VPS_SSH_KEY
            POSTGRES_PASSWORD
            UMAMI_DB_PASSWORD
            UMAMI_APP_SECRET
            VPS_HOST
            VPS_USER
            VPS_PORT
            DJANGO_ALLOWED_HOSTS
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -e
            cd /opt/rohans-weblog

            # Pull latest code
            git pull origin main

            # Write env file
            cat > .env << 'ENVEOF'
            DJANGO_SECRET_KEY=${{ env.DJANGO_SECRET_KEY }}
            SECRET_KEY=${{ env.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=${{ env.DJANGO_ALLOWED_HOSTS }}
            POSTGRES_DB=weblog
            POSTGRES_USER=weblog
            POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
            UMAMI_DB_PASSWORD=${{ env.UMAMI_DB_PASSWORD }}
            UMAMI_APP_SECRET=${{ env.UMAMI_APP_SECRET }}
            ENVEOF

            # Build and deploy
            docker compose build
            docker compose up -d

            # Wait and verify
            sleep 10
            docker compose ps
