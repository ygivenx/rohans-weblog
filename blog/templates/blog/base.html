<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rohan Singh's Weblog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fff;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        nav {
            margin-top: 20px;
        }
        nav a {
            margin-right: 20px;
            text-decoration: none;
            color: #666;
        }
        nav a:hover {
            color: #000;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.5em;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .post-list {
            list-style: none;
        }
        .post-item {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-title {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .post-title a {
            text-decoration: none;
            color: #000;
        }
        .post-title a:hover {
            text-decoration: underline;
        }
        .post-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .post-excerpt {
            color: #555;
        }
        .tags {
            margin-top: 10px;
        }
        .tag {
            display: inline-block;
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-right: 5px;
            color: #666;
        }
        .pagination {
            margin-top: 30px;
            text-align: center;
        }
        .pagination a {
            margin: 0 5px;
            padding: 5px 10px;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .pagination .current {
            background: #000;
            color: #fff;
        }
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            text-align: center;
            color: #666;
        }
        .content {
            margin-top: 20px;
            line-height: 1.8;
        }
        /* Headings */
        .content h1 {
            font-size: 2em;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .content h2 {
            font-size: 1.5em;
            margin-top: 25px;
            margin-bottom: 12px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .content h3 {
            font-size: 1.25em;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .content h4 {
            font-size: 1.1em;
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .content h5, .content h6 {
            font-size: 1em;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        /* Paragraphs */
        .content p {
            margin-bottom: 1em;
        }
        /* Lists */
        .content ul, .content ol {
            margin: 1em 0;
            padding-left: 2em;
        }
        .content li {
            margin: 0.5em 0;
        }
        .content ul {
            list-style-type: disc;
        }
        .content ol {
            list-style-type: decimal;
        }
        .content ul ul, .content ol ol, .content ul ol, .content ol ul {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
        }
        /* Links */
        .content a {
            color: #0066cc;
            text-decoration: underline;
        }
        .content a:hover {
            color: #004499;
        }
        /* Images */
        .content img {
            max-width: 100%;
            height: auto;
            margin: 1.5em 0;
            border-radius: 4px;
        }
        /* Code blocks - Dark Mode */
        .content pre {
            background: #1e1e2e;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #313244;
            margin: 1.5em 0;
            color: #cdd6f4;
        }
        .content code {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 0.875em;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Monaco', 'Consolas', monospace;
        }
        .content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }
        /* Blockquotes */
        .content blockquote {
            border-left: 4px solid #ddd;
            margin: 1.5em 0;
            padding-left: 1em;
            color: #666;
            font-style: italic;
        }
        .content blockquote p {
            margin-bottom: 0.5em;
        }
        .content blockquote p:last-child {
            margin-bottom: 0;
        }
        /* Tables */
        .content table {
            border-collapse: collapse;
            margin: 1.5em 0;
            width: 100%;
        }
        .content table th,
        .content table td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        .content table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        .content table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        /* Horizontal rules */
        .content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 2em 0;
        }
        /* Strong and emphasis */
        .content strong {
            font-weight: bold;
        }
        .content em {
            font-style: italic;
        }
        /* Code highlighting with codehilite - Dark Mode (Catppuccin Mocha) */
        .content .codehilite {
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 8px;
            padding: 16px;
            margin: 1.5em 0;
            overflow-x: auto;
        }
        .content .codehilite pre {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }
        .content .codehilite code {
            background: none;
            padding: 0;
            color: #cdd6f4;
        }

        /* Pygments Syntax Highlighting - Dark Theme */
        .codehilite .hll { background-color: #45475a; }
        .codehilite .c { color: #6c7086; font-style: italic; }  /* Comment */
        .codehilite .err { color: #f38ba8; }  /* Error */
        .codehilite .k { color: #cba6f7; font-weight: bold; }  /* Keyword */
        .codehilite .o { color: #89dceb; }  /* Operator */
        .codehilite .p { color: #cdd6f4; }  /* Punctuation */
        .codehilite .ch { color: #6c7086; font-style: italic; }  /* Comment.Hashbang */
        .codehilite .cm { color: #6c7086; font-style: italic; }  /* Comment.Multiline */
        .codehilite .cp { color: #f9e2af; }  /* Comment.Preproc */
        .codehilite .cpf { color: #6c7086; font-style: italic; }  /* Comment.PreprocFile */
        .codehilite .c1 { color: #6c7086; font-style: italic; }  /* Comment.Single */
        .codehilite .cs { color: #6c7086; font-style: italic; }  /* Comment.Special */
        .codehilite .gd { color: #f38ba8; }  /* Generic.Deleted */
        .codehilite .ge { font-style: italic; }  /* Generic.Emph */
        .codehilite .gi { color: #a6e3a1; }  /* Generic.Inserted */
        .codehilite .gs { font-weight: bold; }  /* Generic.Strong */
        .codehilite .gu { color: #89dceb; font-weight: bold; }  /* Generic.Subheading */
        .codehilite .kc { color: #cba6f7; font-weight: bold; }  /* Keyword.Constant */
        .codehilite .kd { color: #cba6f7; font-weight: bold; }  /* Keyword.Declaration */
        .codehilite .kn { color: #f38ba8; }  /* Keyword.Namespace */
        .codehilite .kp { color: #cba6f7; }  /* Keyword.Pseudo */
        .codehilite .kr { color: #cba6f7; font-weight: bold; }  /* Keyword.Reserved */
        .codehilite .kt { color: #f9e2af; }  /* Keyword.Type */
        .codehilite .m { color: #fab387; }  /* Literal.Number */
        .codehilite .s { color: #a6e3a1; }  /* Literal.String */
        .codehilite .na { color: #89b4fa; }  /* Name.Attribute */
        .codehilite .nb { color: #f9e2af; }  /* Name.Builtin */
        .codehilite .nc { color: #f9e2af; font-weight: bold; }  /* Name.Class */
        .codehilite .no { color: #fab387; }  /* Name.Constant */
        .codehilite .nd { color: #89dceb; }  /* Name.Decorator */
        .codehilite .ni { color: #cdd6f4; }  /* Name.Entity */
        .codehilite .ne { color: #f38ba8; font-weight: bold; }  /* Name.Exception */
        .codehilite .nf { color: #89b4fa; }  /* Name.Function */
        .codehilite .nl { color: #cdd6f4; }  /* Name.Label */
        .codehilite .nn { color: #f9e2af; }  /* Name.Namespace */
        .codehilite .nt { color: #f38ba8; }  /* Name.Tag */
        .codehilite .nv { color: #cdd6f4; }  /* Name.Variable */
        .codehilite .ow { color: #89dceb; font-weight: bold; }  /* Operator.Word */
        .codehilite .w { color: #cdd6f4; }  /* Text.Whitespace */
        .codehilite .mb { color: #fab387; }  /* Literal.Number.Bin */
        .codehilite .mf { color: #fab387; }  /* Literal.Number.Float */
        .codehilite .mh { color: #fab387; }  /* Literal.Number.Hex */
        .codehilite .mi { color: #fab387; }  /* Literal.Number.Integer */
        .codehilite .mo { color: #fab387; }  /* Literal.Number.Oct */
        .codehilite .sa { color: #a6e3a1; }  /* Literal.String.Affix */
        .codehilite .sb { color: #a6e3a1; }  /* Literal.String.Backtick */
        .codehilite .sc { color: #a6e3a1; }  /* Literal.String.Char */
        .codehilite .dl { color: #a6e3a1; }  /* Literal.String.Delimiter */
        .codehilite .sd { color: #6c7086; font-style: italic; }  /* Literal.String.Doc */
        .codehilite .s2 { color: #a6e3a1; }  /* Literal.String.Double */
        .codehilite .se { color: #fab387; }  /* Literal.String.Escape */
        .codehilite .sh { color: #a6e3a1; }  /* Literal.String.Heredoc */
        .codehilite .si { color: #fab387; }  /* Literal.String.Interpol */
        .codehilite .sx { color: #a6e3a1; }  /* Literal.String.Other */
        .codehilite .sr { color: #94e2d5; }  /* Literal.String.Regex */
        .codehilite .s1 { color: #a6e3a1; }  /* Literal.String.Single */
        .codehilite .ss { color: #a6e3a1; }  /* Literal.String.Symbol */
        .codehilite .bp { color: #f9e2af; }  /* Name.Builtin.Pseudo */
        .codehilite .fm { color: #89b4fa; }  /* Name.Function.Magic */
        .codehilite .vc { color: #cdd6f4; }  /* Name.Variable.Class */
        .codehilite .vg { color: #cdd6f4; }  /* Name.Variable.Global */
        .codehilite .vi { color: #cdd6f4; }  /* Name.Variable.Instance */
        .codehilite .vm { color: #cdd6f4; }  /* Name.Variable.Magic */
        .codehilite .il { color: #fab387; }  /* Literal.Number.Integer.Long */

        /* Line numbers */
        .codehilite .linenos {
            color: #6c7086;
            padding-right: 12px;
            border-right: 1px solid #45475a;
            margin-right: 12px;
            user-select: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{% url 'blog:index' %}" style="text-decoration: none; color: inherit;">Rohan Singh's Weblog</a></h1>
            <nav>
                <a href="{% url 'blog:index' %}">Posts</a>
                <a href="{% url 'blog:til_list' %}">TIL</a>
                <a href="{% url 'blog:bookmarks_list' %}">Bookmarks</a>
                <a href="{% url 'blog:search' %}">Search</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {% now "Y" %} Rohan Singh</p>
        </footer>
    </div>
</body>
</html>
