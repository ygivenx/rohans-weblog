<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rohan Singh's Weblog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            line-height: 1.55;
            color: #000;
            background: #fff;
            font-size: 16px;
        }
        a {
            color: #195f00;
            text-decoration: underline;
        }
        a:hover {
            color: #003d00;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 15px;
        }
        header {
            padding-bottom: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ccc;
        }
        header h1 {
            font-size: 1.5em;
            margin-bottom: 2px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.02em;
        }
        header h1 a {
            color: #000;
            text-decoration: none;
        }
        header h1 a:hover {
            text-decoration: underline;
        }
        .site-description {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 8px;
            font-family: 'Montserrat', sans-serif;
        }
        nav {
            margin-top: 6px;
            font-size: 0.8em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        nav a {
            margin-right: 16px;
            color: #195f00;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        h2 {
            font-size: 1.2em;
            margin-top: 20px;
            margin-bottom: 12px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.01em;
        }
        .post-list {
            list-style: none;
        }
        .post-item {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e8e8e8;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-date {
            color: #888;
            font-size: 0.75em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .post-title {
            font-size: 1.15em;
            margin-bottom: 2px;
            font-weight: normal;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        .post-title a {
            color: #195f00;
        }
        .post-meta {
            color: #888;
            font-size: 0.75em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .post-excerpt {
            color: #333;
            font-size: 0.95em;
            margin-top: 4px;
        }
        .tags {
            margin-top: 4px;
        }
        .tag {
            display: inline;
            font-size: 0.72em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            color: #195f00;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .tag::after {
            content: " ";
        }
        .pagination {
            margin-top: 20px;
            font-size: 0.78em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
        }
        .pagination a {
            margin-right: 8px;
            color: #195f00;
        }
        .pagination .current {
            font-weight: 600;
            color: #000;
        }
        footer {
            margin-top: 40px;
            padding-top: 12px;
            border-top: 1px solid #ccc;
            color: #888;
            font-size: 0.75em;
            font-family: 'Montserrat', sans-serif;
        }
        .content {
            margin-top: 16px;
            line-height: 1.7;
        }
        /* Article title (outside .content) */
        article h1 {
            font-size: 1.7em;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            line-height: 1.25;
        }

        /* Headings */
        .content h1 {
            font-size: 1.6em;
            margin-top: 28px;
            margin-bottom: 12px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.02em;
        }
        .content h2 {
            font-size: 1.3em;
            margin-top: 24px;
            margin-bottom: 10px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.01em;
        }
        .content h3 {
            font-size: 1.1em;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        .content h4 {
            font-size: 1em;
            margin-top: 16px;
            margin-bottom: 6px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        .content h5, .content h6 {
            font-size: 0.95em;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        /* Paragraphs */
        .content p {
            margin-bottom: 1em;
        }
        /* Lists */
        .content ul, .content ol {
            margin: 1em 0;
            padding-left: 2em;
        }
        .content li {
            margin: 0.4em 0;
        }
        .content ul {
            list-style-type: disc;
        }
        .content ol {
            list-style-type: decimal;
        }
        .content ul ul, .content ol ol, .content ul ol, .content ol ul {
            margin-top: 0.3em;
            margin-bottom: 0.3em;
        }
        /* Links */
        .content a {
            color: #195f00;
            text-decoration: underline;
        }
        .content a:hover {
            color: #003d00;
        }
        /* Images */
        .content img {
            max-width: 100%;
            height: auto;
            margin: 1.5em 0;
        }
        /* Code blocks - Dark Mode */
        .content pre {
            background: #1e1e2e;
            padding: 14px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #313244;
            margin: 1.5em 0;
            color: #cdd6f4;
        }
        .content code {
            background: #f4f4f4;
            color: #333;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.875em;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Monaco', 'Consolas', monospace;
        }
        .content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }
        /* Blockquotes */
        .content blockquote {
            border-left: 3px solid #ccc;
            margin: 1.5em 0;
            padding-left: 1em;
            color: #555;
            font-style: italic;
        }
        .content blockquote p {
            margin-bottom: 0.5em;
        }
        .content blockquote p:last-child {
            margin-bottom: 0;
        }
        /* Tables */
        .content table {
            border-collapse: collapse;
            margin: 1.5em 0;
            width: 100%;
        }
        .content table th,
        .content table td {
            border: 1px solid #ddd;
            padding: 6px 10px;
            text-align: left;
        }
        .content table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        .content table tr:nth-child(even) {
            background-color: #fafafa;
        }
        /* Horizontal rules */
        .content hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 2em 0;
        }
        /* Strong and emphasis */
        .content strong {
            font-weight: bold;
        }
        .content em {
            font-style: italic;
        }
        /* Code highlighting with codehilite - Dark Mode (Catppuccin Mocha) */
        .content .codehilite {
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 4px;
            padding: 14px;
            margin: 1.5em 0;
            overflow-x: auto;
        }
        .content .codehilite pre {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }
        .content .codehilite code {
            background: none;
            padding: 0;
            color: #cdd6f4;
        }

        /* Pygments Syntax Highlighting - Dark Theme */
        .codehilite .hll { background-color: #45475a; }
        .codehilite .c { color: #6c7086; font-style: italic; }
        .codehilite .err { color: #f38ba8; }
        .codehilite .k { color: #cba6f7; font-weight: bold; }
        .codehilite .o { color: #89dceb; }
        .codehilite .p { color: #cdd6f4; }
        .codehilite .ch { color: #6c7086; font-style: italic; }
        .codehilite .cm { color: #6c7086; font-style: italic; }
        .codehilite .cp { color: #f9e2af; }
        .codehilite .cpf { color: #6c7086; font-style: italic; }
        .codehilite .c1 { color: #6c7086; font-style: italic; }
        .codehilite .cs { color: #6c7086; font-style: italic; }
        .codehilite .gd { color: #f38ba8; }
        .codehilite .ge { font-style: italic; }
        .codehilite .gi { color: #a6e3a1; }
        .codehilite .gs { font-weight: bold; }
        .codehilite .gu { color: #89dceb; font-weight: bold; }
        .codehilite .kc { color: #cba6f7; font-weight: bold; }
        .codehilite .kd { color: #cba6f7; font-weight: bold; }
        .codehilite .kn { color: #f38ba8; }
        .codehilite .kp { color: #cba6f7; }
        .codehilite .kr { color: #cba6f7; font-weight: bold; }
        .codehilite .kt { color: #f9e2af; }
        .codehilite .m { color: #fab387; }
        .codehilite .s { color: #a6e3a1; }
        .codehilite .na { color: #89b4fa; }
        .codehilite .nb { color: #f9e2af; }
        .codehilite .nc { color: #f9e2af; font-weight: bold; }
        .codehilite .no { color: #fab387; }
        .codehilite .nd { color: #89dceb; }
        .codehilite .ni { color: #cdd6f4; }
        .codehilite .ne { color: #f38ba8; font-weight: bold; }
        .codehilite .nf { color: #89b4fa; }
        .codehilite .nl { color: #cdd6f4; }
        .codehilite .nn { color: #f9e2af; }
        .codehilite .nt { color: #f38ba8; }
        .codehilite .nv { color: #cdd6f4; }
        .codehilite .ow { color: #89dceb; font-weight: bold; }
        .codehilite .w { color: #cdd6f4; }
        .codehilite .mb { color: #fab387; }
        .codehilite .mf { color: #fab387; }
        .codehilite .mh { color: #fab387; }
        .codehilite .mi { color: #fab387; }
        .codehilite .mo { color: #fab387; }
        .codehilite .sa { color: #a6e3a1; }
        .codehilite .sb { color: #a6e3a1; }
        .codehilite .sc { color: #a6e3a1; }
        .codehilite .dl { color: #a6e3a1; }
        .codehilite .sd { color: #6c7086; font-style: italic; }
        .codehilite .s2 { color: #a6e3a1; }
        .codehilite .se { color: #fab387; }
        .codehilite .sh { color: #a6e3a1; }
        .codehilite .si { color: #fab387; }
        .codehilite .sx { color: #a6e3a1; }
        .codehilite .sr { color: #94e2d5; }
        .codehilite .s1 { color: #a6e3a1; }
        .codehilite .ss { color: #a6e3a1; }
        .codehilite .bp { color: #f9e2af; }
        .codehilite .fm { color: #89b4fa; }
        .codehilite .vc { color: #cdd6f4; }
        .codehilite .vg { color: #cdd6f4; }
        .codehilite .vi { color: #cdd6f4; }
        .codehilite .vm { color: #cdd6f4; }
        .codehilite .il { color: #fab387; }

        /* Line numbers */
        .codehilite .linenos {
            color: #6c7086;
            padding-right: 12px;
            border-right: 1px solid #45475a;
            margin-right: 12px;
            user-select: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{% url 'blog:index' %}">Rohan Singh's Weblog</a></h1>
            <div class="site-description">Writing about software, data science, and things I learn along the way.</div>
            <nav>
                <a href="{% url 'blog:index' %}">Feed</a>
                <a href="{% url 'blog:post_list' %}">Writing</a>
                <a href="{% url 'blog:til_list' %}">TIL</a>
                <a href="{% url 'blog:bookmarks_list' %}">Bookmarks</a>
                <a href="{% url 'blog:about' %}">About</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; {% now "Y" %} Rohan Singh &middot; <a href="{% url 'blog:search' %}">Search</a></p>
        </footer>
    </div>
</body>
</html>
