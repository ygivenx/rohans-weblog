services:
  - type: web
    name: rohans-weblog
    env: python
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn rohans_weblog.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        sync: false  # Set this in Render dashboard
      - key: DJANGO_SECRET_KEY
        sync: false  # Set this in Render dashboard (generate a secure key)
      - key: DATABASE_URL
        fromDatabase:
          name: rohans-weblog-db
          property: connectionString
    healthCheckPath: /
    autoDeploy: true
    customDomains:
      - rohansweblog.com
      - www.rohansweblog.com

databases:
  - name: rohans-weblog-db
    plan: basic-256mb
    databaseName: rohans_weblog
    user: rohans_weblog_user
